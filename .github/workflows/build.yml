name: Simple Local
on:
  push
jobs:
  build-node:
    runs-on: ubuntu-latest
    container: node:18
    steps:
      - name: Check Node version
        run: node --version
      - name: Check npm version
        run: npm --version
      - uses: actions/checkout@v3
      - name: Install dependencies
        run: npm install
      - name: Install moment package
        run: npm install --save moment
      - name: Run the application
        run: node app.js
